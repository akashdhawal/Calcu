<head>

  <title>calculator</title>

  <style>
    
*{
  padding: 0;
  margin: 0;
  border: border-box;
  background: #0F0E0E;

}

body{
  display: flex;
  flex-direction: column;

}
.calculator{
  width: 300px;
  height: 500px;
  border: 1px solid orange;

  background: #0F0E0E;
  border-radius: 10px;
  box-shadow: -10px -10px 15px #302F30;

  padding-bottom: 10px;
  margin-top: 20px;
  
}
#display{
  width: 296px;
  height: 100px;

  display: flex;
  align-items: end;

}
.first{
  width: 100%;
  height: 75px;
  display: flex;
  align-items: center;
  justify-content: space-evenly;
  
}
.first button{
  width: 60px;
  height: 60px;
  border-radius: 50%;
  box-shadow: -5px -5px 10px #302F30;
  margin-top: 10px;
  margin-left: 1.5px;

}
#long{
  width: 130px;
  border-radius: 1000px;
}
button:focus{
  outline: none;
  border: none;
}
#display{
  display: inline-block;
  background: transparent;
  font-size: 25px;
  color: white;
  
}
#last{
  color: orange;
}
#last1{
  background: #BD6225;
  font-size: 30px;
}

  text-align: capitalize;
  font-family: cursive;
}
h5{
  text-align: right;
  margin-right: 15px;
  text-transform: uppercase;
}

p{
  width: 350px;
  height: 180px;
  border-radius: 10px;
  background-size: cover;
  background: white;
  color: red;
  font-size: 22px;
  font-family: serif;
  letter-spacing: 1.5px;
}


    
  </style>
</head>
<body>
  <div id="personal-detail">
    <p> Note:This is a webpage made by akash dhawal. It contains simple calculator which is used to calculate anything. It is my sucessful thing because i deployed on internet</p>
  </div>
  <h1>simple calculator</h1>
  <div class="calculator">
    <h5>akash</h5>
  <p id="display">0</p>
  <div class="first">
    <button type="submit" id="last">AC</button>
    <button type="submit" id="last">DEL</button>
    <button type="submit" id="last">/</button>
    <button type="submit" id="last">%</button>
  </div>
  <div class="first">
    <button type="submit">7</button>
    <button type="submit">8</button>
    <button type="submit">9</button>
    <button type="submit" id="last">*</button>
  </div>
  <div class="first">
    <button type="submit">4</button>
    <button type="submit">5</button>
    <button type="submit">6</button>
    <button type="submit" id="last">-</button>
  </div>
  <div class="first">
    <button type="submit">1</button>
    <button type="submit">2</button>
    <button type="submit">3</button>
    <button type="submit" id="last">+</button>
  </div>
  <div class="first second">
    <button type="submit" id="long">0</button>
    <button type="submit">.</button>
    <button type="submit" id="last1">=</button>
  </div>
</div>
 <script src='main.js'>
 let buttons = document.querySelectorAll('button');
let display = document.querySelector('#display');
let current_val= '';

buttons.forEach( (button)=>{
  button.addEventListener('click',()=>{
    let value = button.innerText;
    
    if (value=='AC') {
      current_val='';
      console.log('hello')
    } else if (value=='DEL') {
      current_val=current_val.slice(0,-1);
    } else if (value=='=') {
      current_val=eval(current_val);
      
    } else {
      current_val+=value;
    }
    display.innerText=current_val;
  })
})
  
  
 </script>
</body>
